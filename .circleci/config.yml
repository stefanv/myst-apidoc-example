# See: https://circleci.com/docs/2.0/language-python/

version: 2.1

jobs:
  build-docs:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout

      - restore_cache:
          keys:
            - pip-cache-v1-{{ checksum "requirements.txt" }}

      - restore_cache:
          keys:
            - node-cache-v1

      - run:
          name: Install Node.js
          command: |
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y nodejs

      - run:
          name: Clone myst-apidoc
          command: |
            git clone --depth 1 https://github.com/stefanv/myst-apidoc ~/myst-apidoc

      - run:
          name: Build myst-apidoc plugin
          command: |
            cd ~/myst-apidoc/myst-apidoc-plugin
            npm install
            npm run build

      - run:
          name: Install mystmd
          command: |
            npm install mystmd

      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - save_cache:
          key: pip-cache-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip

      - save_cache:
          key: node-cache-v1
          paths:
            - node_modules

      - run:
          name: Generate skimage API JSON
          command: |
            python ~/myst-apidoc/npdoc2json.py skimage > skimage-api.json

      - run:
          name: Generate MyST index pages
          command: |
            python generate-index.py

      - run:
          name: Build docs
          environment:
            DOCS_PATH: _build/html
          command: |
            export BASE_URL="/output/job/$CIRCLE_WORKFLOW_JOB_ID/artifacts/0/$DOCS_PATH"
            npx myst build --html
            rm -f _build/html/*thebe*.js

      - store_artifacts:
          path: _build/html

workflows:
  version: 2
  build-and-docs:
    jobs:
      - build-docs
